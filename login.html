<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 flex justify-between items-center min-h-screen">
    <div class="bg-white w-full max-w-md p-8 rounded-xl shadow-lg mx-auto mt-10">
        <!--logo-->
        <div class="flex justify-center mb-6">
            <div  >
                <img src="assets/github-logo.png" alt="">
            </div>
        </div>
        <h1 class="text-2xl font-semibold text-center">GitHub Issues Tracker</h1>
        <p class="text-center text-gray-500 mb-8">Sign in to manage your issues</p>
        <form id="loginForm">
            <!--username-->
            <label class="block mb-3 font-medium">Username</label>
            <input id="username" type="text" placeholder="Enter Username" class="w-full border rounded-full p-3 mb-1 
            focus:outline-none focus:ring-2 focus:ring-purple-400">
            <p class="text-sm mb-6 text-purple-600">Default: admin</p>
            <!--password-->
            <label class="block mb-3 font-medium">Password</label>
             <input id="password" type="password" placeholder="Enter Password" class="w-full border rounded-full p-3 mb-1 
            focus:outline-none focus:ring-2 focus:ring-purple-400">
            <p class="text-sm mb-6 text-purple-600">Default: admin123</p>
            <button type="submit" class="w-full py-3 font-semibold rounded-lg bg-gradient-to-r
             from-purple-600 to-indigo-600 text-white hover:opacity-90">Sign In</button>
        </form>
        <div class="flex items-center my-6">
            <hr class="flex-grow border-gray-300">
                <span class="px-3 text-gray-500 text-sm">OR</span>
             <hr class="flex-grow border-gray-300">
        </div>
        <div class="bg-gray-100 p-4 rounded-lg text-center text-sm space-y-3">
            <p class="font-bold text-2xl">Demo Credentials:</p>
            <p class="font-semibold">Username : admin</p>
            <p class="font-semibold">Password : admin123</p>
        </div>
        <p id="error" class="text-red-500 text-center mt-4 hidden">Invalid login credentials</p>
    </div>
    <script>
        document.getElementById("loginForm").addEventListener("submit", function (e){
            e.preventDefault();
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            if(username === "admin" && password === "admin123") {
                window.location.href = "index.html";
            }else{
                document.getElementById("error").classList.remove("hidden");
            }
        });
    </script>
</body>
</html>
