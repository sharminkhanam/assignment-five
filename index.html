<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment-Five</title>
    <!--tailwind css-->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!--font awesome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-7xl mx-auto">
        <!--header-->
        <div class="flex flex-col md:flex-row md:justify-between md:items-center mb-6">
            <div class="flex gap-3 items-center ">
                 <img src="assets/github-logo.png" alt="" class="md:w-10 md:h-10  w-8 h-8">
                <h2 class="text-2xl font-bold">GitHub Issuse tracker</h2>
            </div>
           
          <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3 w-full md:w-auto relative">
              <div class="flex items-center gap-3 relative W-full md:w-auto">
                <span class="absolute ml-6"><i class="fa-solid fa-magnifying-glass"></i></span>
            <input id="searchInput" type="text" placeholder="Search issues ..."  
            class="px-4 py-2 border rounded-lg md:w-64 text-center w-full" >
            <button onclick="searchIssue()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-950">
              <i class="fa-solid fa-plus"></i> New Issue
            </button>
        </div>
          </div>
        
        </div>
        <hr class="mb-6 border-gray-300">
        <!--tabs-->
        <div class="flex gap-3 mb-4">
        <button data-tab="all" class="bg-indigo-600 px-4 py-2 rounded-lg tab">All</button>
        <button data-tab="open" class="bg-white px-4 py-2 rounded-lg  tab">Open</button>
        <button data-tab="closed" class="bg-white px-4 py-2 rounded-lg tab">Closed</button>
        </div>
        <!--stats-->
        <div class="bg-white p-5 rounded-2xl shadow mb-4 flex items-center justify-between gap-3">
            
            <div class="left flex items-center gap-4">
                <img src="assets/Aperture.png" alt="" class="bg-gray-200 px-2 py-1 rounded-full">
                 <div class="flex flex-col">
                    <h2 id="issueCount" class="font-semibold text-lg">0 Issuses</h2>
                <p class="text-gray-500 text-sm">Track and manage your project issues</p>
                 </div>
            </div>
            <div class="flex gap-2 md:gap-4 text-sm md:text-base">
                <span class="text-green-500 "> ● Open</span>
                <span class="text-purple-500"> ● Closed</span>
            </div>
       
        </div>
     <!--grids-->
        <div id="issuesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </div>
    <!--model-->
    <div id="issueModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50">
        <div class="bg-white w-[600px] rounded-xl shadow-xl p-6">
            <h2 id="modalTitle" class="text-xl font-semibold mb-2"></h2>
           <div class="flex items-center gap-3 text-sm mb-4"> 
             <span class="bg-green-100 text-green-700 px-2 py-1 rounded-full text-sm">Opened</span>
             <span class="text-gray-500">Opened by</span>
             <span id="modalAuthor" class="font-medium"></span>
             <span class="text-gray-400">● </span>
             <span id="modalDate" class="text-gray-500"></span>
           </div> 
           <div id="modalLabels" class="flex flex-wrap gap-2 mb-4"></div>
            <p id="modalDesc" class="text-gray-600 mb-6"></p>
            <div class="bg-gray-50 p-4 rounded-lg flex justify-between">
            <div>
                <p class="text-sm text-gray-500">Assignee</p>
                <p id="modalAssignee" class="font-medium"></p>
            </div>
            <div>
               <p class="text-sm text-gray-500">Priority</p> 
               <span id="modalPriority" class="px-2 py-1 text-sm rounded-full"></span>
            </div>
        </div>
         <div class="flex justify-end mt-6">
            <button onclick="closeModal()" class="bg-indigo-600 text-white px-4 py-2 rounded-full
             hover:bg-indigo-700">Close</button>
        </div>
        </div>
        
       
       
    </div>
    <script src="script.js"></script>
</body>
</html>
